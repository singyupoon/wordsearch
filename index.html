

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字搜索海報生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; }
            .poster-container { box-shadow: none !important; border: none !important; width: 100% !important; margin: 0 !important; }
            @page { size: A4 portrait; margin: 10mm; }
        }
        .grid-cell { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; font-family: monospace; font-weight: 900; user-select: none; border: 1px solid #e5e7eb; cursor: pointer; transition: all 0.2s; }
        .target { color: #dc2626 !important; background-color: #fef2f2 !important; text-decoration: underline !important; }
        .found { background-color: #dcfce7 !important; color: #166534 !important; font-weight: bold; border-color: #4ade80 !important; }
    </style>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-6">
        <div class="no-print w-full md:w-80 bg-white p-6 rounded-xl shadow-lg h-fit">
            <h2 class="text-xl font-bold mb-4">⚙️ 文字搜索設定</h2>
            <div id="wordCount" class="text-sm text-gray-600 mb-4 font-medium">已輸入詞彙總數: 0</div>
            
            <div id="inputGroup">
                <textarea id="wordInput" class="w-full h-40 p-2 border rounded text-sm mb-2" placeholder="請輸入答案 (空格或換行分隔)"></textarea>
                <button id="btnGenerate" class="w-full bg-blue-600 text-white py-2 rounded mb-2 font-bold hover:bg-blue-700">生成海報</button>
            </div>

            <div id="targetBar" class="hidden mb-6 p-4 bg-blue-50 border-2 border-blue-200 rounded-lg text-center">
                <div class="text-xs text-blue-500 font-bold uppercase">當前搜尋目標</div>
                <div id="currentTarget" class="text-3xl font-bold text-blue-800 my-2">--</div>
                <div id="progress" class="text-sm text-blue-600">進度: 0 / 0</div>
            </div>

            <div class="flex gap-2 mb-2">
                <button id="btnStudent" class="flex-1 py-1 bg-gray-200 rounded text-xs hover:bg-gray-300">學生模式</button>
                <button id="btnAnswer" class="flex-1 py-1 bg-gray-200 rounded text-xs hover:bg-gray-300">顯示答案</button>
            </div>
            
            <div id="editControls" class="hidden">
                <button id="btnEdit" class="w-full bg-amber-500 text-white py-2 rounded mb-2 font-bold hover:bg-amber-600">返回編輯模式</button>
                <button id="btnReset" class="w-full bg-red-500 text-white py-2 rounded mb-2 font-bold hover:bg-red-600">重置遊戲</button>
            </div>
            
            <button id="btnPrint" class="w-full bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">列印為 PDF</button>
        </div>

        <div class="flex-1 bg-white p-6 rounded-xl shadow-lg poster-container">
            <h1 class="text-2xl font-bold mb-4 text-center">文字搜索海報</h1>
            <div id="gridBody" class="grid w-full gap-0" style="grid-template-columns: repeat(30, minmax(0, 1fr));"></div>
        </div>
    </div>

    <script>
        const SIZE = 30;
        let matrix = Array(SIZE).fill(null).map(() => Array(SIZE).fill(""));
        let answerMap = new Map();
        let foundWords = new Set();
        let wordList = [];
        let currentIndex = 0;
        let showAns = false;
        let isStudentMode = false;

        document.getElementById('wordInput').addEventListener('input', updateWordCount);

        function updateWordCount() {
            const input = document.getElementById('wordInput').value;
            wordList = input.split(/[\s\n\r\t]+/).map(i => i.replace(/[^\u4e00-\u9fa5]/g, '')).filter(w => w.length > 0);
            document.getElementById('wordCount').innerText = `已輸入詞彙總數: ${wordList.length}`;
        }

        function generateGrid() {
            updateWordCount();
            matrix = Array(SIZE).fill(null).map(() => Array(SIZE).fill(""));
            answerMap.clear();
            foundWords.clear();
            wordList.sort((a, b) => b.length - a.length);

            wordList.forEach(word => {
                let placed = false;
                for(let attempts = 0; attempts < 2000 && !placed; attempts++) {
                    const dr = Math.random() > 0.5 ? 1 : 0;
                    const dc = dr === 1 ? (Math.random() > 0.5 ? 1 : 0) : 1;
                    let r = Math.floor(Math.random() * SIZE), c = Math.floor(Math.random() * SIZE);
                    
                    let canPlace = true;
                    for(let i=0; i<word.length; i++) {
                        let nr = r + i*dr, nc = c + i*dc;
                        if(nr >= SIZE || nc >= SIZE || (matrix[nr][nc] !== "" && matrix[nr][nc] !== word[i])) { canPlace = false; break; }
                    }
                    if(canPlace) {
                        let coords = [];
                        for(let i=0; i<word.length; i++) {
                            matrix[r + i*dr][c + i*dc] = word[i];
                            coords.push(`${r + i*dr},${c + i*dc}`);
                        }
                        answerMap.set(word, coords);
                        placed = true;
                    }
                }
            });

            const pool = "基督真理道路生命聖徒平安喜樂啟示福音信實公義創造救贖憐憫盼望溫柔忍耐良善節制智慧正直誠實寬容謙卑";
            for(let r=0; r<SIZE; r++) {
                for(let c=0; c<SIZE; c++) {
                    if(matrix[r][c] === "") matrix[r][c] = pool[Math.floor(Math.random() * pool.length)];
                }
            }
            render();
        }

        function render() {
            const body = document.getElementById('gridBody');
            body.innerHTML = '';
            for(let r=0; r<SIZE; r++) {
                for(let c=0; c<SIZE; c++) {
                    const div = document.createElement('div');
                    div.className = "grid-cell text-[8px] md:text-sm";
                    div.innerText = matrix[r][c];
                    div.dataset.coord = `${r},${c}`;
                    
                    if(isStudentMode) {
                        div.onclick = () => handleCellClick(`${r},${c}`);
                    }
                    
                    if(showAns) {
                        for(let coords of answerMap.values()) {
                            if(coords.includes(`${r},${c}`)) div.classList.add('target');
                        }
                    }
                    body.appendChild(div);
                }
            }
            applyFoundStyles();
        }

        function handleCellClick(coord) {
            if(!isStudentMode || currentIndex >= wordList.length) return;
            const targetWord = wordList[currentIndex];
            if(answerMap.has(targetWord) && answerMap.get(targetWord).includes(coord)) {
                foundWords.add(targetWord);
                currentIndex++;
                updateTarget();
                applyFoundStyles();
            }
        }

        function applyFoundStyles() {
            document.querySelectorAll('.grid-cell').forEach(div => {
                const coord = div.dataset.coord;
                for(let word of foundWords) {
                    if(answerMap.has(word) && answerMap.get(word).includes(coord)) div.classList.add('found');
                }
            });
        }

        function updateTarget() {
            if(currentIndex < wordList.length) {
                document.getElementById('currentTarget').innerText = wordList[currentIndex];
                document.getElementById('progress').innerText = `目標: ${currentIndex + 1} / ${wordList.length}`;
            } else {
                document.getElementById('currentTarget').innerText = "🎉 全數完成！";
                document.getElementById('progress').innerText = "已完成所有搜索";
            }
        }

        document.getElementById('btnStudent').onclick = () => {
            isStudentMode = true;
            document.getElementById('inputGroup').classList.add('hidden');
            document.getElementById('editControls').classList.remove('hidden');
            document.getElementById('targetBar').classList.remove('hidden');
            updateTarget();
            render();
        };

        document.getElementById('btnReset').onclick = () => {
            currentIndex = 0;
            foundWords.clear();
            updateTarget();
            render();
        };

        document.getElementById('btnGenerate').onclick = () => {
            currentIndex = 0;
            generateGrid();
        };

        document.getElementById('btnEdit').onclick = () => { 
            isStudentMode = false;
            document.getElementById('inputGroup').classList.remove('hidden'); 
            document.getElementById('editControls').classList.add('hidden'); 
            document.getElementById('targetBar').classList.add('hidden'); 
            render();
        };
        document.getElementById('btnAnswer').onclick = () => { showAns = !showAns; render(); };
        document.getElementById('btnPrint').onclick = () => window.print();
        generateGrid();
    </script>
</body>
</html>
