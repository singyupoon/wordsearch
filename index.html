<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖言搜索海報生成器 (空格分隔優化版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none !important; } .poster-container { box-shadow: none !important; border: none !important; } }
        .grid-cell { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; font-family: monospace; font-weight: 900; user-select: none; border: 1px solid #e5e7eb; }
        .target { color: #dc2626 !important; background-color: #fef2f2 !important; text-decoration: underline !important; }
    </style>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-6">
        <div class="no-print w-full md:w-80 bg-white p-6 rounded-xl shadow-lg h-fit">
            <h2 class="text-xl font-bold mb-4">⚙️ 聖言搜索設定</h2>
            <textarea id="wordInput" class="w-full h-40 p-2 border rounded text-sm mb-4" placeholder="請輸入答案 (可用空格或換行分隔，系統將自動清理非漢字內容)"></textarea>
            <button id="btnGenerate" class="w-full bg-blue-600 text-white py-2 rounded mb-2 font-bold hover:bg-blue-700">生成海報 (保證間隔)</button>
            <div class="flex gap-2">
                <button id="btnStudent" class="flex-1 py-1 bg-gray-200 rounded text-xs hover:bg-gray-300">學生模式</button>
                <button id="btnAnswer" class="flex-1 py-1 bg-gray-200 rounded text-xs hover:bg-gray-300">顯示答案</button>
            </div>
            <p class="text-[10px] text-gray-500 mt-4">註：空格與換行皆視為分隔符，系統自動確保詞彙間隔至少兩個字。</p>
        </div>

        <div class="flex-1 bg-white p-6 rounded-xl shadow-lg poster-container">
            <h1 class="text-2xl font-bold mb-4 text-center">聖言搜索海報</h1>
            <div id="gridBody" class="grid w-full gap-0" style="grid-template-columns: repeat(30, minmax(0, 1fr));"></div>
        </div>
    </div>

    <script>
        const SIZE = 30;
        let matrix = Array(SIZE).fill(null).map(() => Array(SIZE).fill(""));
        let answers = new Set();
        let showAns = false;

        function isSafe(r, c) {
            // 檢查該座標及其周圍一圈是否有已放置的答案 (Buffer of 1 = 確保間隔至少2)
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (answers.has(`${r + dr},${c + dc}`)) return false;
                }
            }
            return true;
        }

        function generateGrid() {
            const input = document.getElementById('wordInput').value;
            // 修正：將所有空格與換行符號視為分隔，並清理非漢字
            const words = input
                .split(/[\s\n\r\t]+/) // 將任何空格、換行符號視為分割標準
                .map(item => item.replace(/[^\u4e00-\u9fa5]/g, ''))
                .filter(w => w.length > 0);
            
            matrix = Array(SIZE).fill(null).map(() => Array(SIZE).fill(""));
            answers.clear();

            words.forEach(word => {
                let placed = false;
                let attempts = 0;

                while(!placed && attempts < 500) {
                    const isDiagonal = Math.random() > 0.5;
                    let r = Math.floor(Math.random() * SIZE);
                    let c = Math.floor(Math.random() * SIZE);
                    
                    let canPlace = true;
                    let path = [];

                    for(let i=0; i<word.length; i++) {
                        let currR = isDiagonal ? r + i : r;
                        let currC = isDiagonal ? c + i : c + i;

                        if (currR >= SIZE || currC >= SIZE || !isSafe(currR, currC)) {
                            canPlace = false;
                            break;
                        }
                        path.push({r: currR, c: currC});
                    }

                    if (canPlace) {
                        path.forEach((p, i) => {
                            matrix[p.r][p.c] = word[i];
                            answers.add(`${p.r},${p.c}`);
                        });
                        placed = true;
                    }
                    attempts++;
                }
            });

            const chars = "神愛世人恩典真理道路生命聖徒平安喜樂啟示福音信實公義";
            for(let r=0; r<SIZE; r++) {
                for(let c=0; c<SIZE; c++) {
                    if(matrix[r][c] === "") matrix[r][c] = chars[Math.floor(Math.random() * chars.length)];
                }
            }
            render();
        }

        function render() {
            const body = document.getElementById('gridBody');
            body.innerHTML = '';
            for(let r=0; r<SIZE; r++) {
                for(let c=0; c<SIZE; c++) {
                    const div = document.createElement('div');
                    div.className = "grid-cell text-[6px] md:text-sm";
                    div.innerText = matrix[r][c];
                    if(showAns && answers.has(`${r},${c}`)) div.classList.add('target');
                    body.appendChild(div);
                }
            }
        }

        document.getElementById('btnGenerate').onclick = generateGrid;
        document.getElementById('btnStudent').onclick = () => { showAns = false; render(); };
        document.getElementById('btnAnswer').onclick = () => { showAns = true; render(); };
        
        generateGrid();
    </script>
</body>
</html>
