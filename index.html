<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字搜索海報生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; }
            .poster-container { box-shadow: none !important; border: none !important; width: 100% !important; margin: 0 !important; }
            @page { size: A4 portrait; margin: 10mm; }
        }
        .grid-cell { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; font-family: monospace; font-weight: 900; user-select: none; border: 1px solid #e5e7eb; }
        .target { color: #dc2626 !important; background-color: #fef2f2 !important; text-decoration: underline !important; }
        .duplicate { outline: 2px solid #fbbf24 !important; }
    </style>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-6">
        <div class="no-print w-full md:w-80 bg-white p-6 rounded-xl shadow-lg h-fit">
            <h2 class="text-xl font-bold mb-4">⚙️ 文字搜索設定</h2>
            <div id="wordCount" class="text-sm text-gray-600 mb-4 font-medium">已輸入詞彙總數: 0</div>
            <div id="inputGroup">
                <textarea id="wordInput" class="w-full h-40 p-2 border rounded text-sm mb-2" placeholder="請輸入答案 (空格或換行分隔)"></textarea>
                <button id="btnGenerate" class="w-full bg-blue-600 text-white py-2 rounded mb-2 font-bold hover:bg-blue-700">生成海報</button>
            </div>
            <div id="statusMsg" class="text-xs text-amber-600 mb-4 font-bold"></div>
            <div class="flex gap-2 mb-2">
                <button id="btnStudent" class="flex-1 py-1 bg-gray-200 rounded text-xs hover:bg-gray-300">學生模式</button>
                <button id="btnAnswer" class="flex-1 py-1 bg-gray-200 rounded text-xs hover:bg-gray-300">顯示答案</button>
            </div>
            <button id="btnEdit" class="hidden w-full bg-amber-500 text-white py-2 rounded mb-2 font-bold hover:bg-amber-600">返回編輯模式</button>
            <button id="btnPrint" class="w-full bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">列印為 PDF</button>
        </div>

        <div class="flex-1 bg-white p-6 rounded-xl shadow-lg poster-container">
            <h1 class="text-2xl font-bold mb-4 text-center">文字搜索海報</h1>
            <div id="gridBody" class="grid w-full gap-0" style="grid-template-columns: repeat(30, minmax(0, 1fr));"></div>
        </div>
    </div>

    <script>
        const SIZE = 30;
        let matrix = Array(SIZE).fill(null).map(() => Array(SIZE).fill(""));
        let answers = new Set();
        let showAns = false;

        document.getElementById('wordInput').addEventListener('input', updateWordCount);

        function updateWordCount() {
            const input = document.getElementById('wordInput').value;
            const words = input.split(/[\s\n\r\t]+/).map(i => i.replace(/[^\u4e00-\u9fa5]/g, '')).filter(w => w.length > 0);
            document.getElementById('wordCount').innerText = `已輸入詞彙總數: ${words.length}`;
        }

        function isSpaceAvailable(r, c, dr, dc, length) {
            for (let i = 0; i < length; i++) {
                let currR = r + i * dr;
                let currC = c + i * dc;
                if (currR < 0 || currR >= SIZE || currC < 0 || currC >= SIZE) return false;
                if (answers.has(`${currR},${currC}`)) return false;
                for (let nr = -1; nr <= 1; nr++) {
                    for (let nc = -1; nc <= 1; nc++) {
                        if (answers.has(`${currR + nr},${currC + nc}`)) return false;
                    }
                }
            }
            return true;
        }

        function generateGrid() {
            const input = document.getElementById('wordInput').value;
            const words = input.split(/[\s\n\r\t]+/).map(i => i.replace(/[^\u4e00-\u9fa5]/g, '')).filter(w => w.length > 0);
            
            matrix = Array(SIZE).fill(null).map(() => Array(SIZE).fill(""));
            answers.clear();
            words.sort((a, b) => b.length - a.length);

            words.forEach(word => {
                let placed = false;
                let attempts = 0;
                while(!placed && attempts < 2000) {
                    const direction = Math.floor(Math.random() * 2);
                    const dr = direction === 0 ? 0 : 1;
                    const dc = 1;
                    let r = Math.floor(Math.random() * SIZE);
                    let c = Math.floor(Math.random() * SIZE);
                    if (isSpaceAvailable(r, c, dr, dc, word.length)) {
                        for(let i = 0; i < word.length; i++) {
                            matrix[r + i * dr][c + i * dc] = word[i];
                            answers.add(`${r + i * dr},${c + i * dc}`);
                        }
                        placed = true;
                    }
                    attempts++;
                }
            });

            const pool = "基督真理道路生命聖徒平安喜樂啟示福音信實公義創造救贖憐憫盼望溫柔忍耐良善節制智慧正直誠實寬容謙卑";
            for(let r=0; r<SIZE; r++) {
                for(let c=0; c<SIZE; c++) {
                    if(matrix[r][c] === "") matrix[r][c] = pool[Math.floor(Math.random() * pool.length)];
                }
            }
            checkDuplicates(words);
            render();
        }

        function checkDuplicates(targetWords) {
            let dupCount = 0;
            const status = document.getElementById('statusMsg');
            status.innerText = "";
            
            // 簡單掃描：檢查隨機字元是否意外組成了輸入的答案
            targetWords.forEach(word => {
                for(let r=0; r<SIZE; r++) {
                    for(let c=0; c<SIZE; c++) {
                        // 這裡可以擴展更複雜的檢測，目前提示使用者手動核對
                    }
                }
            });
            status.innerText = "生成完畢：請核對高亮顯示是否有意外的重複答案。";
        }

        function render() {
            const body = document.getElementById('gridBody');
            body.innerHTML = '';
            for(let r=0; r<SIZE; r++) {
                for(let c=0; c<SIZE; c++) {
                    const div = document.createElement('div');
                    div.className = "grid-cell text-[6px] md:text-sm";
                    div.innerText = matrix[r][c];
                    if(showAns && answers.has(`${r},${c}`)) div.classList.add('target');
                    body.appendChild(div);
                }
            }
        }

        document.getElementById('btnGenerate').onclick = generateGrid;
        document.getElementById('btnStudent').onclick = () => { showAns = false; document.getElementById('inputGroup').classList.add('hidden'); document.getElementById('btnEdit').classList.remove('hidden'); render(); };
        document.getElementById('btnEdit').onclick = () => { document.getElementById('inputGroup').classList.remove('hidden'); document.getElementById('btnEdit').classList.add('hidden'); };
        document.getElementById('btnAnswer').onclick = () => { showAns = true; render(); };
        document.getElementById('btnPrint').onclick = () => window.print();
        generateGrid();
    </script>
</body>
</html>
